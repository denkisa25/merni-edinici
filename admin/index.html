<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Merilo Admin</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2a2d3e;
    --accent: #5b8dee;
    --accent2: #43d9a0;
    --danger: #e05b5b;
    --text: #dde1f0;
    --muted: #7880a0;
    --input-bg: #13151f;
    --radius: 6px;
    --font: 'Berkeley Mono', 'Fira Code', 'Cascadia Code', ui-monospace, monospace;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 13px;
    line-height: 1.6;
  }

  /* Layout */
  .shell { display: flex; height: 100vh; overflow: hidden; }

  .sidebar {
    width: 180px;
    flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 20px 0 12px;
  }

  .sidebar-brand {
    padding: 0 16px 20px;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: .03em;
    color: var(--accent);
    border-bottom: 1px solid var(--border);
    margin-bottom: 12px;
  }
  .sidebar-brand span { color: var(--muted); font-weight: 400; font-size: 11px; display: block; }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    cursor: pointer;
    color: var(--muted);
    font-size: 12.5px;
    border-left: 2px solid transparent;
    transition: color .15s, border-color .15s, background .15s;
    user-select: none;
  }
  .nav-item:hover { color: var(--text); background: rgba(255,255,255,.04); }
  .nav-item.active { color: var(--accent); border-left-color: var(--accent); background: rgba(91,141,238,.08); }
  .nav-icon { width: 14px; text-align: center; font-style: normal; }

  .main {
    flex: 1;
    overflow-y: auto;
    padding: 28px 32px;
  }

  /* Header */
  .page-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 24px;
    gap: 16px;
  }
  .page-title { font-size: 18px; font-weight: 700; letter-spacing: .02em; }
  .page-sub { color: var(--muted); font-size: 12px; }

  /* Panels */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 16px;
  }
  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    font-weight: 600;
    font-size: 12px;
    letter-spacing: .05em;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    user-select: none;
  }
  .panel-header:hover { color: var(--text); }
  .panel-body { padding: 16px; }

  /* Form elements */
  label {
    display: block;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 4px;
    letter-spacing: .04em;
    text-transform: uppercase;
  }
  input[type=text], input[type=number], textarea, select {
    width: 100%;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    padding: 7px 10px;
    outline: none;
    transition: border-color .15s;
  }
  input[type=text]:focus, input[type=number]:focus, textarea:focus, select:focus {
    border-color: var(--accent);
  }
  textarea { resize: vertical; min-height: 60px; }

  .field { margin-bottom: 12px; }
  .field:last-child { margin-bottom: 0; }

  .row { display: grid; gap: 12px; }
  .row-2 { grid-template-columns: 1fr 1fr; }
  .row-3 { grid-template-columns: 1fr 1fr 1fr; }

  /* Buttons */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 7px 14px;
    border-radius: var(--radius);
    font-family: var(--font);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid transparent;
    transition: opacity .15s, transform .1s;
    white-space: nowrap;
  }
  .btn:active { transform: scale(.97); }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { opacity: .88; }
  .btn-success { background: var(--accent2); color: #0f1117; }
  .btn-success:hover { opacity: .88; }
  .btn-danger { background: transparent; border-color: var(--danger); color: var(--danger); }
  .btn-danger:hover { background: var(--danger); color: #fff; }
  .btn-ghost { background: transparent; border-color: var(--border); color: var(--muted); }
  .btn-ghost:hover { color: var(--text); border-color: var(--text); }
  .btn-sm { padding: 4px 10px; font-size: 11px; }

  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 16px; align-items: center; }

  /* Ingredient list */
  .ing-list { display: grid; gap: 6px; }
  .ing-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 12px;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    transition: border-color .15s;
  }
  .ing-row:hover { border-color: var(--accent); }
  .ing-row.selected { border-color: var(--accent); background: rgba(91,141,238,.07); }
  .ing-id { color: var(--muted); font-size: 11px; width: 180px; flex-shrink: 0; }
  .ing-name { flex: 1; font-weight: 600; }
  .ing-density { color: var(--accent2); font-size: 12px; width: 80px; text-align: right; flex-shrink: 0; }

  /* Edit drawer */
  .edit-drawer {
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: var(--radius);
    padding: 20px;
    margin-top: 12px;
    display: none;
  }
  .edit-drawer.open { display: block; }
  .drawer-title {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 16px;
    color: var(--accent);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface);
    border: 1px solid var(--accent2);
    border-radius: var(--radius);
    padding: 10px 16px;
    font-size: 12px;
    color: var(--accent2);
    z-index: 999;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity .2s, transform .2s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.error { border-color: var(--danger); color: var(--danger); }

  /* Build output */
  .build-output {
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    font-size: 12px;
    line-height: 1.7;
    white-space: pre-wrap;
    min-height: 80px;
    color: var(--accent2);
  }
  .build-output.idle { color: var(--muted); }

  /* Translation fields */
  .trans-key {
    font-size: 11px;
    color: var(--accent);
    margin-bottom: 3px;
    letter-spacing: .03em;
  }
  .trans-hint { font-size: 10px; color: var(--muted); margin-top: 2px; margin-bottom: 10px; }

  /* Tabs hidden */
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* Status dot */
  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 4px;
  }
  .status-dot.ok { background: var(--accent2); }
  .status-dot.err { background: var(--danger); }
  .status-dot.idle { background: var(--muted); }

  /* Divider */
  hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

  /* Units table */
  .units-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .units-table th {
    text-align: left;
    padding: 6px 10px;
    color: var(--muted);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: .05em;
    border-bottom: 1px solid var(--border);
  }
  .units-table td {
    padding: 6px 10px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  .units-table tr:last-child td { border-bottom: none; }
  .units-table input { padding: 4px 7px; font-size: 12px; }
</style>
</head>
<body>
<div class="shell">
  <nav class="sidebar">
    <div class="sidebar-brand">merilo.pro<span>admin panel</span></div>
    <div class="nav-item active" data-tab="ingredients"><i class="nav-icon">🧂</i>Ingredients</div>
    <div class="nav-item" data-tab="translations"><i class="nav-icon">🌐</i>Translations</div>
    <div class="nav-item" data-tab="units"><i class="nav-icon">📐</i>Units</div>
    <div class="nav-item" data-tab="settings"><i class="nav-icon">⚙️</i>Settings</div>
    <div class="nav-item" data-tab="build"><i class="nav-icon">🔨</i>Build</div>
  </nav>
  <main class="main">
    <div id="tab-ingredients" class="tab-panel active"></div>
    <div id="tab-translations" class="tab-panel"></div>
    <div id="tab-units" class="tab-panel"></div>
    <div id="tab-settings" class="tab-panel"></div>
    <div id="tab-build" class="tab-panel"></div>
  </main>
</div>
<div class="toast" id="toast"></div>
<script src="app.js"></script>
</body>
</html>

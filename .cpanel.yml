# cPanel Git Version Control - deployment tasks
# Runs automatically on the cPanel server after a manual "Update from Remote" pull.
# Build runs ON the server (D-03). dist/ is produced fresh each deploy (D-04).
#
# merilo.pro is a dedicated domain — full dist/ syncs to its document root.
# Typical cPanel addon domain root: /home/kickstic/public_html/merilo.pro/
#
# Node.js binary is resolved by sourcing ~/.bash_profile, which cPanel's Node.js Selector
# populates with the active ea-nodejs* version's PATH.

deployment:
  tasks:
    - rsync -a --delete dist/ /home/kickstic/public_html/merilo.pro/
    - echo "[deploy] Done."

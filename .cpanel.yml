# cPanel Git Version Control - deployment tasks
# Runs automatically on the cPanel server after a manual "Update from Remote" pull.
# Build runs ON the server (D-03). dist/ is produced fresh each deploy (D-04).
#
# Before the first deploy, replace the two placeholder tokens below:
#   __CPANEL_USERNAME__  -> kciksctic
#   __PUBLIC_DIR__       -> absolute path of the directory served by your domain or subdomain
#                          examples:
# /home/kickstic/public_html/ochen-lekar.com/
# /home/kickstic/public_html/ochen-lekar.com/merni-edinici/
# /home/kickstic/public_html/merni.ochen-lekar.com/
#
# Node.js binary is resolved by sourcing ~/.bash_profile, which cPanel's Node.js Selector
# populates with the active ea-nodejs* version's PATH. This avoids hardcoding a specific
# Node.js major version and works regardless of which version the host upgrades to next.

deployment:
  tasks:
    - export DEPLOYPATH=/home/kickstic/public_html/ochen-lekar.com/merni-edinici/
    - echo "[deploy] Locating Node.js..."
    - export PATH="/opt/cpanel/ea-nodejs22/bin:/opt/cpanel/ea-nodejs20/bin:/opt/cpanel/ea-nodejs18/bin:/usr/local/bin:$PATH"
    - node -v
    - npm -v
    - echo "[deploy] Installing dependencies"
    - npm ci
    - echo "[deploy] Building"
    - npm run build
    - echo "[deploy] Publishing to $DEPLOYPATH"
    - mkdir -p "$DEPLOYPATH"
    - rsync -a --delete dist/ "$DEPLOYPATH"/
    - echo "[deploy] Done."

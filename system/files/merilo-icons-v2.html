<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>merilo.pro — category icons v2</title>
<link href="https://fonts.googleapis.com/css2?family=Spectral:wght@500;600;700&family=Onest:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F7F4EC;--card:#FFFFFF;--ink:#2A2521;--ink-soft:#6B645C;
    --line:#E7E0D3;--line-strong:#D8CFBE;--terra:#C0532B;--terra-deep:#9A3F1E;--terra-tint:#F6E7DE;
    --serif:'Spectral',serif;--sans:'Onest',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--paper);color:var(--ink);font-family:var(--sans);padding:40px 24px 80px;line-height:1.55}
  .wrap{max-width:820px;margin:0 auto}
  h1{font-family:var(--serif);font-weight:700;font-size:30px;margin-bottom:6px}
  .lead{color:var(--ink-soft);font-size:15.5px;margin-bottom:34px;max-width:580px}
  h2{font-family:var(--serif);font-weight:600;font-size:20px;margin:38px 0 14px}
  .section-label{font-size:12px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;
    color:var(--ink-soft);margin:0 0 16px}

  /* main recommended set */
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:12px}
  .item{display:flex;align-items:center;gap:14px;background:var(--card);
    border:1px solid var(--line);border-radius:12px;padding:14px 16px}
  .badge{width:44px;height:44px;flex:0 0 auto;border-radius:12px;background:var(--terra-tint);
    display:flex;align-items:center;justify-content:center}
  .badge svg{width:24px;height:24px;color:var(--terra-deep)}
  .meta .nm{font-family:var(--serif);font-weight:600;font-size:15.5px;line-height:1.2}
  .meta .desc{font-size:12.5px;color:var(--ink-soft);margin-top:2px}

  /* size legibility test */
  .sizes{display:flex;align-items:center;gap:26px;background:var(--card);border:1px solid var(--line);
    border-radius:12px;padding:20px 24px;flex-wrap:wrap}
  .sizes .col{display:flex;flex-direction:column;align-items:center;gap:8px;color:var(--terra-deep)}
  .sizes .col span{font-size:11px;color:var(--ink-soft)}

  /* alternatives */
  .alts{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
  .alt{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px;text-align:center}
  .alt .badge{margin:0 auto 10px}
  .alt .nm{font-size:13px;color:var(--ink);font-weight:500}
  .alt .tag{font-size:11px;color:var(--ink-soft);margin-top:2px}
  .alt.pick{border-color:var(--terra);box-shadow:0 0 0 3px var(--terra-tint)}
  .alt.pick .nm{color:var(--terra-deep);font-weight:600}
</style>
</head>
<body>
<div class="wrap">
  <h1>Икони за категориите — v2</h1>
  <p class="lead">По-прости, по-разпознаваеми форми, които остават четливи при малък размер. Всяка икона е stroke-based в стила на логото.</p>

  <p class="section-label">Препоръчан комплект</p>
  <div class="grid" id="mainGrid"></div>

  <h2>Тест за четливост — при реалните размери</h2>
  <div class="sizes" id="sizeTest"></div>

  <h2>Алтернативи за по-трудните</h2>
  <p class="section-label">Брашна и нишестета</p>
  <div class="alts" id="altFlour"></div>
  <p class="section-label" style="margin-top:22px">Зърнени и бобови</p>
  <div class="alts" id="altGrain"></div>
  <p class="section-label" style="margin-top:22px">Млечни продукти</p>
  <div class="alts" id="altDairy"></div>
</div>

<script>
const S = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">';

// RECOMMENDED SET — simpler, literal, legible at 24px
const MAIN = {
  'Брашна и нишестета': {
    desc:'торбичка брашно',
    p:'<path d="M7 8h10l1.2 11a2 2 0 0 1-2 2.2H7.8a2 2 0 0 1-2-2.2L7 8z"/><path d="M7 8c0-2 1.2-3 2.5-3.5C8.8 3.8 9.2 3 10 3M17 8c0-2-1.2-3-2.5-3.5"/><path d="M9.5 13.5h5"/>'
  },
  'Течности': {
    desc:'капка',
    p:'<path d="M12 3.5c3.4 4 5.5 6.7 5.5 9.6a5.5 5.5 0 0 1-11 0C6.5 10.2 8.6 7.5 12 3.5z"/>'
  },
  'Подсладители': {
    desc:'буркан с мед',
    p:'<rect x="6" y="8" width="12" height="13" rx="2"/><path d="M7.5 8V6.5h9V8"/><path d="M9 5h6"/><path d="M12 12v5"/>'
  },
  'Ядки и сухи плодове': {
    desc:'жълъд / ядка',
    p:'<path d="M6 10a6 6 0 0 1 12 0c0 4-3 8-6 8s-6-4-6-8z"/><path d="M6.5 10h11"/><path d="M12 4.5V3"/>'
  },
  'Млечни продукти': {
    desc:'кутия мляко',
    p:'<path d="M8 8h8v11a1 1 0 0 1-1 1H9a1 1 0 0 1-1-1V8z"/><path d="M8 8l1.5-3h5L16 8"/><path d="M10.5 5V3.5h3V5"/>'
  },
  'Подправки и набухватели': {
    desc:'солница',
    p:'<path d="M8 9h8l.6 10a2 2 0 0 1-2 2.1H9.4a2 2 0 0 1-2-2.1L8 9z"/><path d="M8 9V6.5a4 4 0 0 1 8 0V9"/><circle cx="10.5" cy="5" r=".5"/><circle cx="13.5" cy="5" r=".5"/><circle cx="12" cy="4" r=".5"/>'
  },
  'Зърнени и бобови': {
    desc:'житен клас',
    p:'<path d="M12 21V9"/><path d="M12 9c0-2-1.5-3.5-3.5-4 0 2 1.5 3.5 3.5 4z"/><path d="M12 9c0-2 1.5-3.5 3.5-4 0 2-1.5 3.5-3.5 4z"/><path d="M12 14c0-2-1.5-3.5-3.5-4 0 2 1.5 3.5 3.5 4z"/><path d="M12 14c0-2 1.5-3.5 3.5-4 0 2-1.5 3.5-3.5 4z"/>'
  },
};

const mg = document.getElementById('mainGrid');
Object.entries(MAIN).forEach(([n,o])=>{
  mg.insertAdjacentHTML('beforeend',
   `<div class="item"><span class="badge">${S}${o.p}</svg></span>
      <span class="meta"><span class="nm">${n}</span><span class="desc">${o.desc}</span></span></div>`);
});

// size test — flour icon at 16 / 20 / 24 / 32
const st = document.getElementById('sizeTest');
[16,20,24,32,40].forEach(sz=>{
  st.insertAdjacentHTML('beforeend',
   `<div class="col"><svg width="${sz}" height="${sz}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">${MAIN['Брашна и нишестета'].p}</svg><span>${sz}px</span></div>`);
});

// ALTERNATIVES
function alts(elId, arr){
  const el=document.getElementById(elId);
  arr.forEach(a=>{
    el.insertAdjacentHTML('beforeend',
     `<div class="alt ${a.pick?'pick':''}"><span class="badge">${S}${a.p}</svg></span>
        <div class="nm">${a.nm}</div><div class="tag">${a.tag}</div></div>`);
  });
}
alts('altFlour',[
  {nm:'Торбичка',tag:'препоръчано',pick:true,p:MAIN['Брашна и нишестета'].p},
  {nm:'Купа + облаче',tag:'пресяване',p:'<path d="M4 12h16a8 8 0 0 1-16 0z"/><path d="M9 12c0-2 1-3 3-3s3 1 3 3"/><circle cx="9" cy="6.5" r="1"/><circle cx="12.5" cy="5.5" r="1"/><circle cx="15.5" cy="7" r="1"/>'},
  {nm:'Чувал',tag:'насипно',p:'<path d="M8 4h8l-1 4c2 1 3 3.5 3 6.5C18 19 15.5 21 12 21s-6-2-6-6.5c0-3 1-5.5 3-6.5L8 4z"/><path d="M8 8h8"/>'},
]);
alts('altGrain',[
  {nm:'Житен клас',tag:'препоръчано',pick:true,p:MAIN['Зърнени и бобови'].p},
  {nm:'Зрънца',tag:'ориз/бобови',p:'<ellipse cx="9" cy="8" rx="1.6" ry="3" transform="rotate(-20 9 8)"/><ellipse cx="15" cy="9" rx="1.6" ry="3" transform="rotate(20 15 9)"/><ellipse cx="8" cy="15" rx="1.6" ry="3" transform="rotate(15 8 15)"/><ellipse cx="14" cy="16" rx="1.6" ry="3" transform="rotate(-15 14 16)"/>'},
  {nm:'Купа с ориз',tag:'купа',p:'<path d="M4 11h16a8 8 0 0 1-16 0z"/><path d="M7 8.5l1-1M12 7.5V6.5M16.5 8.5l1-1"/>'},
]);
alts('altDairy',[
  {nm:'Кутия мляко',tag:'препоръчано',pick:true,p:MAIN['Млечни продукти'].p},
  {nm:'Капка + лист',tag:'млечно',p:'<path d="M12 4c3 3.5 4.5 5.5 4.5 8a4.5 4.5 0 0 1-9 0C7.5 9.5 9 7.5 12 4z"/><path d="M12 11c1.5-1.5 3-1.5 4-1-0 1.5-1.5 2.5-3 2.5"/>'},
  {nm:'Бутилка',tag:'мляко',p:'<path d="M10 3h4v2.5l1.5 2v12a1.5 1.5 0 0 1-1.5 1.5h-4A1.5 1.5 0 0 1 8.5 19.5v-12L10 5.5V3z"/><path d="M8.5 10h7"/>'},
]);
</script>
</body>
</html>

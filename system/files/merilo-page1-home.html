<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Мерни единици в кухнята | Мерило</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;0,700;0,800;1,500;1,600&family=Onest:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FBF6EC; --paper-2:#F4ECDC; --ink:#2A2420; --ink-soft:#6B5F54; --line:#E4D8C4;
    --paprika:#C2522C; --paprika-dk:#9E3F1F; --honey:#E0A12E; --card:#FFFDF8;
    --shadow:0 1px 2px rgba(42,36,32,.04),0 8px 28px -12px rgba(42,36,32,.18);
    --radius:16px; --maxw:720px;
    --serif:"Spectral",Georgia,serif; --sans:"Onest",system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--sans);color:var(--ink);background:var(--paper);
    background-image:radial-gradient(rgba(160,130,90,.05) 1px,transparent 1px);background-size:4px 4px;
    line-height:1.6;font-size:17px;-webkit-font-smoothing:antialiased;padding-bottom:40px}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 20px}
  a{color:inherit}

  header{padding:22px 0 6px}
  .brand{display:inline-flex;align-items:center;gap:10px;text-decoration:none}
  .brand .mark{width:28px;height:28px;flex:0 0 auto}
  .brand .name{font-family:var(--serif);font-weight:800;font-size:21px;letter-spacing:-.01em;color:var(--ink)}
  .brand .name b{color:var(--paprika);font-weight:800}

  nav.crumbs{font-size:13.5px;color:var(--ink-soft);margin-top:16px;display:flex;flex-wrap:wrap;gap:6px;align-items:center}
  nav.crumbs a{color:var(--ink-soft);text-decoration:none}
  nav.crumbs a:hover{color:var(--paprika)}
  nav.crumbs .sep{opacity:.45}
  nav.crumbs .here{color:var(--ink)}

  .hero{padding:26px 0 8px}
  h1{font-family:var(--serif);font-weight:800;font-size:clamp(28px,6.5vw,42px);line-height:1.08;letter-spacing:-.015em;max-width:14ch}
  h1 em{font-style:italic;color:var(--paprika)}
  .hero .lead{margin-top:14px;font-size:clamp(17px,4vw,19px);color:var(--ink-soft);max-width:46ch}

  /* search */
  .search{position:relative;margin:22px 0 8px;max-width:480px}
  .search input{width:100%;font:inherit;font-size:16px;color:var(--ink);background:var(--card);
    border:1px solid var(--line);border-radius:999px;padding:14px 18px 14px 46px;outline:none;transition:.15s}
  .search input:focus{border-color:var(--paprika);box-shadow:0 0 0 3px rgba(194,82,44,.15)}
  .search input::placeholder{color:#A89A85}
  .search .ico{position:absolute;left:17px;top:50%;transform:translateY(-50%);color:var(--ink-soft);line-height:0}
  .search .ico svg{width:18px;height:18px}
  .results{position:absolute;top:calc(100% + 8px);left:0;right:0;background:var(--card);
    border:1px solid var(--line);border-radius:13px;box-shadow:var(--shadow);overflow:hidden;display:none;z-index:20}
  .results.show{display:block}
  .results a{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:12px 18px;
    text-decoration:none;border-bottom:1px solid var(--line);transition:background .12s}
  .results a:last-child{border-bottom:0}
  .results a:hover{background:var(--paper-2)}
  .results .nm{font-family:var(--serif);font-weight:600;font-size:16px}
  .results .vl{font-weight:700;color:var(--paprika);font-size:14px;white-space:nowrap;font-variant-numeric:tabular-nums}
  .results .empty{padding:14px 18px;color:var(--ink-soft);font-size:14px}

  .section-label{font-size:12px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:var(--ink-soft);margin:26px 0 14px}

  /* category accordion */
  .cats{display:flex;flex-direction:column;gap:12px}
  .cat{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;transition:border-color .2s,box-shadow .2s}
  .cat.open{border-color:var(--paprika);box-shadow:var(--shadow)}
  .cat-head{width:100%;text-align:left;background:transparent;border:0;cursor:pointer;padding:18px 20px;
    display:flex;align-items:center;gap:15px;font-family:inherit}
  .cat-badge{width:44px;height:44px;flex:0 0 auto;border-radius:12px;background:var(--paper-2);
    display:flex;align-items:center;justify-content:center;transition:background .2s}
  .cat.open .cat-badge{background:var(--paprika)}
  .cat-badge svg{width:24px;height:24px;color:var(--paprika-dk);transition:color .2s}
  .cat.open .cat-badge svg{color:#fff}
  .cat-meta{flex:1;min-width:0}
  .cat-name{font-family:var(--serif);font-weight:600;font-size:19px;line-height:1.2;color:var(--ink)}
  .cat-count{font-size:13px;color:var(--ink-soft);margin-top:1px}
  .cat-link{font-size:12px;color:var(--paprika-dk);text-decoration:none;font-weight:600;white-space:nowrap;opacity:0;transition:opacity .2s}
  .cat.open .cat-link{opacity:1}
  .cat-link:hover{text-decoration:underline}
  .cat-chev{color:var(--ink-soft);transition:transform .3s ease;line-height:0;flex:0 0 auto}
  .cat-chev svg{width:20px;height:20px}
  .cat.open .cat-chev{transform:rotate(180deg);color:var(--paprika)}

  .cat-body{max-height:0;overflow:hidden;transition:max-height .42s cubic-bezier(.22,1,.36,1)}
  .cat-body-inner{padding:0 16px 16px}
  .ing-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:9px}
  .ing{display:block;text-decoration:none;background:var(--paper);border:1px solid var(--line);
    border-radius:12px;padding:13px 16px;opacity:0;transform:translateY(6px);transition:background .15s,border-color .15s,transform .15s}
  .cat.open .ing{animation:rise .4s cubic-bezier(.22,1,.36,1) forwards}
  .ing:hover{background:var(--paper-2);border-color:var(--paprika);transform:translateY(-1px)}
  .ing .nm{display:block;font-family:var(--serif);font-weight:600;font-size:16px;line-height:1.25;color:var(--ink);
    overflow-wrap:normal;word-break:keep-all;hyphens:none}
  .ing .vl{display:block;margin-top:4px;font-weight:700;font-size:14px;color:var(--paprika);font-variant-numeric:tabular-nums}
  @keyframes rise{to{opacity:1;transform:none}}

  footer{border-top:1px solid var(--line);margin-top:40px;padding:26px 0 0;font-size:13.5px;color:var(--ink-soft)}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <a class="brand" href="#">
      <span class="mark" aria-hidden="true">
        <svg width="28" height="28" viewBox="0 0 30 30" fill="none">
          <rect x="1.2" y="1.2" width="27.6" height="27.6" rx="8" stroke="#C2522C" stroke-width="2.4"/>
          <line x1="8"  y1="9" x2="8"  y2="21" stroke="#C2522C" stroke-width="2.4" stroke-linecap="round"/>
          <line x1="15" y1="6" x2="15" y2="24" stroke="#E0A12E" stroke-width="2.4" stroke-linecap="round"/>
          <line x1="22" y1="9" x2="22" y2="21" stroke="#C2522C" stroke-width="2.4" stroke-linecap="round"/>
        </svg>
      </span>
      <span class="name">Мерило<b>.</b></span>
    </a>
  </header>

  <nav class="crumbs" aria-label="breadcrumb">
    <a href="#">Начало</a><span class="sep">›</span>
    <span class="here">Мерни единици</span>
  </nav>

  <div class="hero">
    <h1>Мерни единици в <em>кухнята</em></h1>
    <p class="lead">Изберете категория или потърсете съставка, за да видите точните тегла в чаши, супени и чаени лъжички.</p>
  </div>

  <div class="search">
    <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
    <input id="q" type="text" placeholder="Търсете съставка — напр. брашно, захар, мляко…" autocomplete="off">
    <div class="results" id="results"></div>
  </div>

  <p class="section-label">Категории</p>
  <div class="cats" id="cats"></div>

  <footer><p>Мерило · Кухненски калкулатор за грамове и милилитри. Стойностите са приблизителни.</p></footer>

</div>

<script>
// real icons (v2 recommended set)
const ICON = {
  brasna:'<path d="M7 8h10l1.2 11a2 2 0 0 1-2 2.2H7.8a2 2 0 0 1-2-2.2L7 8z"/><path d="M7 8c0-2 1.2-3 2.5-3.5C8.8 3.8 9.2 3 10 3M17 8c0-2-1.2-3-2.5-3.5"/><path d="M9.5 13.5h5"/>',
  techno:'<path d="M12 3.5c3.4 4 5.5 6.7 5.5 9.6a5.5 5.5 0 0 1-11 0C6.5 10.2 8.6 7.5 12 3.5z"/>',
  sweet:'<rect x="6" y="8" width="12" height="13" rx="2"/><path d="M7.5 8V6.5h9V8"/><path d="M9 5h6"/><path d="M12 12v5"/>',
  nuts:'<path d="M6 10a6 6 0 0 1 12 0c0 4-3 8-6 8s-6-4-6-8z"/><path d="M6.5 10h11"/><path d="M12 4.5V3"/>',
  dairy:'<path d="M8 8h8v11a1 1 0 0 1-1 1H9a1 1 0 0 1-1-1V8z"/><path d="M8 8l1.5-3h5L16 8"/><path d="M10.5 5V3.5h3V5"/>',
  spice:'<path d="M8 9h8l.6 10a2 2 0 0 1-2 2.1H9.4a2 2 0 0 1-2-2.1L8 9z"/><path d="M8 9V6.5a4 4 0 0 1 8 0V9"/><circle cx="10.5" cy="5" r=".5"/><circle cx="13.5" cy="5" r=".5"/><circle cx="12" cy="4" r=".5"/>',
  grains:'<path d="M12 21V9"/><path d="M12 9c0-2-1.5-3.5-3.5-4 0 2 1.5 3.5 3.5 4z"/><path d="M12 9c0-2 1.5-3.5 3.5-4 0 2-1.5 3.5-3.5 4z"/><path d="M12 14c0-2-1.5-3.5-3.5-4 0 2 1.5 3.5 3.5 4z"/><path d="M12 14c0-2 1.5-3.5 3.5-4 0 2-1.5 3.5-3.5 4z"/>',
};
// real data: density g/ml, liquid flag. value per чаша = 250ml.
const ING = {"brashno":{name:"Брашно",d:.5,liq:0},"zahar":{name:"Захар",d:.85,liq:0},"pudra-zahar":{name:"Пудра захар",d:.5,liq:0},"kafyava-zahar":{name:"Кафява захар",d:.9,liq:0},"oriz":{name:"Ориз",d:.78,liq:0},"bulgur":{name:"Булгур",d:.78,liq:0},"gris":{name:"Грис",d:.67,liq:0},"kakao":{name:"Какао",d:.36,liq:0},"oves":{name:"Овесени ядки",d:.38,liq:0},"nisheste":{name:"Нишесте",d:.52,liq:0},"palnozarnesto-brashno":{name:"Пълнозърнесто брашно",d:.55,liq:0},"carevichno-brashno":{name:"Царевично брашно",d:.6,liq:0},"mlyako":{name:"Мляко",d:1.03,liq:1},"kiselo-mlyako":{name:"Кисело мляко",d:1.03,liq:1},"zakvasena-smetana":{name:"Заквасена сметана",d:.96,liq:1},"olio":{name:"Олио",d:.92,liq:1},"maslo":{name:"Масло",d:.96,liq:1},"med":{name:"Мед",d:1.42,liq:1},"klenov-sirop":{name:"Кленов сироп",d:1.32,liq:1},"sol":{name:"Сол",d:1.2,liq:0},"soda":{name:"Сода бикарбонат",d:.92,liq:0},"bakpulver":{name:"Бакпулвер",d:.8,liq:0},"lesha":{name:"Леща",d:.85,liq:0},"orehi":{name:"Орехи",d:.5,liq:0},"stafidi":{name:"Стафиди",d:.62,liq:0},"kokos":{name:"Кокосови стърготини",d:.35,liq:0},"ocet":{name:"Оцет",d:1.01,liq:1},"voda":{name:"Вода",d:1,liq:1}};

// categories (matches image 3 counts). slug → SEO category page.
const CATS = [
  {id:"brasna",  ico:"brasna",  name:"Брашна и нишестета", items:["brashno","nisheste","palnozarnesto-brashno","carevichno-brashno"]},
  {id:"techno",  ico:"techno",  name:"Течности",          items:["voda","mlyako","olio","ocet","klenov-sirop"]},
  {id:"sweet",   ico:"sweet",   name:"Подсладители",       items:["zahar","pudra-zahar","kafyava-zahar","kakao","med"]},
  {id:"nuts",    ico:"nuts",    name:"Ядки и сухи плодове", items:["orehi","stafidi","kokos","oves"]},
  {id:"dairy",   ico:"dairy",   name:"Млечни продукти",     items:["kiselo-mlyako","zakvasena-smetana"]},
  {id:"spice",   ico:"spice",   name:"Подправки и набухватели", items:["sol","soda","bakpulver","maslo"]},
  {id:"grains",  ico:"grains",  name:"Зърнени и бобови",    items:["oriz","bulgur","gris","lesha"]},
];

const fmt = n => (Math.round(n)).toString();
function valOf(slug){
  const x = ING[slug];
  const grams = x.d*250;
  return x.liq ? "≈ "+fmt(250)+" мл/чаша" : "≈ "+fmt(grams)+" г/чаша";
}
const SVG = p => '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">'+p+'</svg>';

const catsEl = document.getElementById('cats');
CATS.forEach(c=>{
  const items = c.items.map((slug,i)=>{
    const x = ING[slug];
    return `<a class="ing" href="#${slug}" style="animation-delay:${i*40}ms">
      <span class="nm">${x.name}</span><span class="vl">${valOf(slug)}</span></a>`;
  }).join('');
  catsEl.insertAdjacentHTML('beforeend',`
    <div class="cat" id="cat-${c.id}">
      <button class="cat-head" onclick="toggleCat('${c.id}')" aria-expanded="false">
        <span class="cat-badge">${SVG(ICON[c.ico])}</span>
        <span class="cat-meta">
          <span class="cat-name">${c.name}</span>
          <span class="cat-count">${c.items.length} съставки</span>
        </span>
        <a class="cat-link" href="#kategoria-${c.id}" onclick="event.stopPropagation()">цялата категория →</a>
        <span class="cat-chev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></span>
      </button>
      <div class="cat-body" id="body-${c.id}"><div class="cat-body-inner"><div class="ing-grid">${items}</div></div></div>
    </div>`);
});

function toggleCat(id){
  const cat = document.getElementById('cat-'+id);
  const body = document.getElementById('body-'+id);
  const open = cat.classList.contains('open');
  document.querySelectorAll('.cat.open').forEach(o=>{
    o.classList.remove('open');
    o.querySelector('.cat-head').setAttribute('aria-expanded','false');
    document.getElementById('body-'+o.id.replace('cat-','')).style.maxHeight='0';
  });
  if(!open){
    cat.classList.add('open');
    cat.querySelector('.cat-head').setAttribute('aria-expanded','true');
    body.style.maxHeight = body.scrollHeight + 'px';
    cat.querySelectorAll('.ing').forEach(el=>{el.style.animation='none';el.offsetHeight;el.style.animation='';});
  }
}

// search across all ingredients
const ALL = Object.keys(ING).map(slug=>({slug,name:ING[slug].name,vl:valOf(slug)}));
const q=document.getElementById('q'), res=document.getElementById('results');
q.addEventListener('input',()=>{
  const v=q.value.trim().toLowerCase();
  if(!v){res.classList.remove('show');res.innerHTML='';return;}
  const hits=ALL.filter(x=>x.name.toLowerCase().includes(v)).slice(0,7);
  res.innerHTML = hits.length
    ? hits.map(h=>`<a href="#${h.slug}"><span class="nm">${h.name}</span><span class="vl">${h.vl}</span></a>`).join('')
    : `<div class="empty">Няма съвпадение за „${q.value}"</div>`;
  res.classList.add('show');
});
document.addEventListener('click',e=>{if(!e.target.closest('.search'))res.classList.remove('show');});

toggleCat('brasna'); // open first so the effect shows immediately
</script>
</body>
</html>
